id: "007"
name: "混合基金资产配置标签筛选"
description: "按股债偏好、权益策略、择时标签等枚举字段筛选混合基金"
type: sql

params:
  tag_conditions:
    type: dict
    description: |
      标签字段等值过滤，格式 {字段名: 枚举值}
      如 {"c_stk_bd_pref": "偏股"} 或 {"c_eq_strategy": "纯股票"}
    required: true
    allowed_tag_fields:
      - c_stk_bd_pref
      - c_eq_strategy
      - c_eq_timing

  limit:
    type: int
    default: 50
    max: 200

sql: |
  SELECT t.c_fd_code, b.c_short_name,
         t.c_stk_pos_avg, t.c_bd_pos_avg, t.c_stk_bd_pref,
         t.c_eq_strategy, t.c_eq_timing
  FROM tb_fd_tag_asset_mix t
  JOIN tb_fd_basic_info b ON t.c_fd_code = b.c_fd_code
  WHERE t.c_report_date = (SELECT MAX(c_report_date) FROM tb_fd_tag_asset_mix)
    {@tag_conditions}
  ORDER BY t.c_stk_pos_avg DESC
  LIMIT {:limit}

tags: ["混合", "标签", "股债偏好", "策略"]
