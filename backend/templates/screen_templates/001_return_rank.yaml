id: "001"
name: "指定区间收益率排名"
description: "按指定收益区间（近1月/3月/6月/1年等）的收益率降序排列基金，可按基金分类过滤"
type: sql

params:
  trade_date:
    type: date
    description: "截止日期，格式 YYYY-MM-DD"
    required: false
    default: "latest"  # latest 表示取 tb_fd_perform_abs 中最新的 c_trade_date

  period_code:
    type: enum
    description: "收益区间"
    required: true
    options:
      近1月: "00"
      近3月: "01"
      近6月: "02"
      近1年: "03"
      近2年: "04"
      近3年: "05"
      近5年: "06"
      年初至今: "07"
      成立以来: "08"

  fund_category:
    type: string
    description: "基金一级分类名称过滤（可选），如：权益、固收加、债券、混合"
    required: false

  limit:
    type: int
    description: "返回条数"
    required: false
    default: 50
    max: 200

sql: |
  SELECT
      b.c_fd_code,
      b.c_short_name,
      cat.c_type1_name,
      cat.c_type2_name,
      p.c_period_ret,
      p.c_ann_ret,
      p.c_ann_vol,
      p.c_mdd,
      p.c_sharpe
  FROM tb_fd_perform_abs p
  JOIN tb_fd_basic_info b ON p.c_fd_code = b.c_fd_code
  LEFT JOIN (
      SELECT c_fd_code, c_type1_name, c_type2_name,
             ROW_NUMBER() OVER (PARTITION BY c_fd_code ORDER BY c_report_date DESC) AS rn
      FROM tb_fd_category
  ) cat ON b.c_fd_code = cat.c_fd_code AND cat.rn = 1
  WHERE p.c_trade_date = %s
    AND p.c_period_code = %s
    {category_filter}
  ORDER BY p.c_period_ret DESC
  LIMIT %s

tags: ["收益率", "排名"]
