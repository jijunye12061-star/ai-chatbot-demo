id: "002"
name: "概念主题曝露度筛选"
description: "筛选对指定概念板块有持仓曝露的基金，同时验证最新一期和近两期中报/年报的曝露均值"
type: python_func
func: "screen_functions.concept_exposure.concept_exposure_filter"

params:
  concept_codes:
    type: list
    description: "概念板块代码列表，由 get_dimension_list('概念板块') + LLM 选定，如 ['007216']"
    required: true

  min_latest_exposure:
    type: float
    description: "最新一期概念曝露度下限（%），默认5"
    required: false
    default: 5

  min_hist_exposure:
    type: float
    description: "近两期中报/年报曝露度均值下限（%），默认5"
    required: false
    default: 5

  fund_category_code:
    type: enum
    description: "基金一级分类，默认权益基金"
    required: false
    default: "001"
    options:
      权益基金: "001"
      固收加基金: "002"
      债券基金: "003"
      混合基金: "004"

  limit:
    type: int
    description: "返回条数，默认50，最大200"
    required: false
    default: 50
    max: 200

tags: ["持仓", "概念", "曝露度"]
