id: "006"
name: "固收+基金资产配置标签筛选"
description: "按风险特征、股票转债策略、择时标签等枚举字段筛选固收+基金"
type: sql

params:
  tag_conditions:
    type: dict
    description: |
      标签字段等值过滤，格式 {字段名: 枚举值}
      如 {"c_eq_risk_level": "激进"} 或 {"c_stk_cb_strategy": "纯股票"}
    required: true
    allowed_tag_fields:
      - c_eq_risk_level
      - c_stk_cb_strategy
      - c_stk_timing
      - c_cb_timing

  limit:
    type: int
    default: 50
    max: 200

sql: |
  SELECT t.c_fd_code, b.c_short_name,
         t.c_eq_pos_avg, t.c_eq_risk_level, t.c_stk_cb_strategy,
         t.c_stk_timing, t.c_cb_timing
  FROM tb_fd_tag_asset_fi t
  JOIN tb_fd_basic_info b ON t.c_fd_code = b.c_fd_code
  WHERE t.c_report_date = (SELECT MAX(c_report_date) FROM tb_fd_tag_asset_fi)
    {@tag_conditions}
  ORDER BY t.c_eq_pos_avg DESC
  LIMIT {:limit}

tags: ["固收加", "标签", "风险", "策略"]
