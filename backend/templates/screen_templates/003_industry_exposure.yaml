id: "003"
name: "申万行业曝露度筛选"
description: "筛选对指定申万行业有持仓曝露的基金，双重验证（最新期+近两期中报/年报均值），支持一/二/三级行业码混合输入"
type: python_func
func: "screen_functions.industry_exposure.industry_exposure_filter"

params:
  sw_codes:
    type: list
    description: "申万行业代码列表（6位一级/9位二级/12位三级混合，由 get_dimension_list('申万行业分类') + LLM 选定，如 ['029023']）"
    required: true

  min_latest_exposure:
    type: float
    description: "最新一期行业曝露度下限（%），默认5"
    required: false
    default: 5

  min_hist_exposure:
    type: float
    description: "近两期中报/年报曝露度均值下限（%），默认5"
    required: false
    default: 5

  fund_category_code:
    type: enum
    description: "基金一级分类，默认权益基金"
    required: false
    default: "001"
    options:
      权益基金: "001"
      固收加基金: "002"
      债券基金: "003"
      混合基金: "004"

  limit:
    type: int
    description: "返回条数，默认50，最大200"
    required: false
    default: 50
    max: 200

tags: ["持仓", "行业", "曝露度", "申万"]
