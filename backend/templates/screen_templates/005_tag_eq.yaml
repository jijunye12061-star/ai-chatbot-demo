id: "005"
name: "权益基金资产配置标签筛选"
description: "按仓位等级、择时标签等枚举字段筛选权益基金"
type: sql

params:
  tag_conditions:
    type: dict
    description: |
      标签字段等值过滤，格式 {字段名: 枚举值}
      如 {"c_stk_pos_level": "高仓位"} 或 {"c_stk_timing": "择时"}
    required: true
    allowed_tag_fields:
      - c_stk_pos_level
      - c_stk_timing

  limit:
    type: int
    default: 50
    max: 200

sql: |
  SELECT t.c_fd_code, b.c_short_name,
         t.c_stk_pos_avg, t.c_stk_pos_level, t.c_stk_timing
  FROM tb_fd_tag_asset_eq t
  JOIN tb_fd_basic_info b ON t.c_fd_code = b.c_fd_code
  WHERE t.c_report_date = (SELECT MAX(c_report_date) FROM tb_fd_tag_asset_eq)
    {@tag_conditions}
  ORDER BY t.c_stk_pos_avg DESC
  LIMIT {:limit}

tags: ["权益", "仓位", "择时", "标签"]
